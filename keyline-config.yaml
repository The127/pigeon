server:
  host: "0.0.0.0"
  port: 8081
  externalUrl: "http://localhost:8081"
  allowedOrigins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:5177"

frontend:
  externalUrl: "http://localhost:5177"

database:
  mode: "postgres"
  postgres:
    host: "keyline-db"
    port: 5432
    username: "keyline"
    password: "keyline"
    sslMode: "disable"

initialVirtualServer:
  name: "pigeon"
  displayName: "Pigeon"
  enableRegistration: false
  signingAlgorithm: "EdDSA"
  createSystemAdminRole: true
  createAdmin: true
  admin:
    username: admin
    displayName: Admin
    primaryEmail: admin@pigeon.local
    # Default password: "pigeon" — change before exposing to the internet
    passwordHash: "$argon2id$v=19$m=16,t=2,p=1$MTIzNDU2Nzg$QWu7e+sjG5knAdNLoKdLDg"
  projects:
    - slug: "pigeon"
      name: "Pigeon"
      description: "Pigeon webhook delivery service"
      applications:
        - name: "pigeon-api"
          displayName: "Pigeon API"
          type: "public"
          redirectUris:
            - "http://localhost:5173/auth/callback"
          postLogoutRedirectUris:
            - "http://localhost:5173"

keyStore:
  mode: "directory"
  directory:
    path: "./keys"

cache:
  mode: memory

leaderElection:
  mode: none
